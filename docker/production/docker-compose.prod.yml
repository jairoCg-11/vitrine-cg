services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vitrine_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - vitrine_network
      - security-links_security-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.vitrine-minio.rule=Host(`storage.vitrine-cg.inovautomatica.com`)"
        - "traefik.http.routers.vitrine-minio.entrypoints=websecure"
        - "traefik.http.routers.vitrine-minio.tls.certresolver=letsencrypt"
        - "traefik.http.services.vitrine-minio.loadbalancer.server.port=9000"

  backend:
    image: vitrine-cg-backend:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_PRODUTOS: ${MINIO_BUCKET_PRODUTOS}
      MINIO_PUBLIC_URL: https://storage.vitrine-cg.inovautomatica.com
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: https://vitrine-cg.inovautomatica.com
    networks:
      - vitrine_network
      - security-links_security-network
    depends_on:
      - postgres
      - minio
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.vitrine-backend.rule=Host(`api.vitrine-cg.inovautomatica.com`)"
        - "traefik.http.routers.vitrine-backend.entrypoints=websecure"
        - "traefik.http.routers.vitrine-backend.tls.certresolver=letsencrypt"
        - "traefik.http.services.vitrine-backend.loadbalancer.server.port=8000"
        # Segurança — headers HTTP
        - "traefik.http.middlewares.vitrine-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.vitrine-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.vitrine-headers.headers.forceSTSHeader=true"
        - "traefik.http.routers.vitrine-backend.middlewares=vitrine-headers"

  frontend:
    image: vitrine-cg-frontend:latest
    environment:
      NODE_ENV: production
    networks:
      - vitrine_network
      - security-links_security-network
    depends_on:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.vitrine-frontend.rule=Host(`vitrine-cg.inovautomatica.com`)"
        - "traefik.http.routers.vitrine-frontend.entrypoints=websecure"
        - "traefik.http.routers.vitrine-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.vitrine-frontend.loadbalancer.server.port=3000"
        # Segurança — headers HTTP
        - "traefik.http.middlewares.vitrine-frontend-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.vitrine-frontend-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.vitrine-frontend-headers.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.vitrine-frontend-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.vitrine-frontend-headers.headers.browserXssFilter=true"
        - "traefik.http.routers.vitrine-frontend.middlewares=vitrine-frontend-headers"

volumes:
  postgres_data:
  minio_data:

networks:
  vitrine_network:
    driver: overlay
  security-links_security-network:
    external: true
