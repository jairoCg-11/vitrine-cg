name: Deploy — Vitrine CG

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build e Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build — Backend
        run: |
          docker build \
            -t vitrine-cg-backend:latest \
            apps/backend/

      - name: Build — Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.vitrine-cg.inovautomatica.com \
            --build-arg NEXT_PUBLIC_SITE_URL=https://vitrine-cg.inovautomatica.com \
            -t vitrine-cg-frontend:latest \
            apps/frontend/

      - name: Exporta imagens Docker
        run: |
          docker save vitrine-cg-backend:latest  | gzip > /tmp/vitrine-backend.tar.gz
          docker save vitrine-cg-frontend:latest | gzip > /tmp/vitrine-frontend.tar.gz

      - name: Configura chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Envia imagens para a VPS
        run: |
          scp -i ~/.ssh/id_ed25519 \
            /tmp/vitrine-backend.tar.gz \
            /tmp/vitrine-frontend.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy na VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo '📦 Carregando imagens...'
            docker load < vitrine-backend.tar.gz
            docker load < vitrine-frontend.tar.gz
            echo '🔄 Atualizando serviços...'
            docker service update --image vitrine-cg-backend:latest --force vitrine-cg_backend
            docker service update --image vitrine-cg-frontend:latest --force vitrine-cg_frontend
            echo '⏳ Aguardando...'
            sleep 20
            echo '🗃️ Migrations...'
            PGPASS=\$(grep POSTGRES_PASSWORD ${{ secrets.DEPLOY_PATH }}/.env | cut -d= -f2)
            docker exec -e POSTGRES_PORT=5432 -e POSTGRES_HOST=vitrine-cg_postgres -e POSTGRES_DB=vitrine_cg -e POSTGRES_USER=vitrine_user -e POSTGRES_PASSWORD=\"\$PGPASS\" \$(docker ps -q -f name=vitrine-cg_backend) alembic upgrade head
            echo '✅ Concluído!'
            docker service ls | grep vitrine-cg"
